defaults:
  - data/dataloader
  - model/student
  - train/efficiency
  - train/losses
  - _self_

experiment: student_full
seed: 42

training:
  epochs: 2
  steps_per_epoch: 12
  micro_batch_size: 4
  hidden_dim: 256
  image_size: 64
  seq_len: 16
  vocab_size: 1024
  lr: 0.001
  weight_decay: 0.0001
  device: auto

verifier:
  backend: internvl
  model_id: OpenGVLab/InternVL3_5-8B
  mock_hidden_dim: 64
  crop_size: 64
  use_augmented_queries: true
  query_selection: first
  augmented_phrase_glob: data/annotations/*/*_aug.pth
