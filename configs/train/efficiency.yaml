# Runtime efficiency + optimization policy consumed by `Trainer` and
# `run_distillation_step`/`run_phase2_finetune_step`.
# These knobs control precision, optimizer type, and distillation schedules.

# AMP settings for forward/backward compute.
# `bf16` is preferred on A100 for stability and throughput.
# GradScaler is used only when amp_dtype is fp16.
amp: true
amp_dtype: bf16
grad_accum_steps: 16
grad_clip_norm: 0.1
activation_checkpointing: false
torch_compile: false

# Training stage/optimizer selection.
# `phase1` enables online verifier losses.
# `phase2_strict` runs verifier-free fine-tuning losses.
mode: phase1
optimizer: musgd

# LR decay controls (StepLR by epoch).
# After `lr_decay_epoch` epochs, lr is multiplied by `lr_decay_gamma`.
# Set `lr_decay_epoch=0` to disable scheduler.
lr_decay_epoch: 40
lr_decay_gamma: 0.1

# Number of warmup/freeze epochs for the text encoder in phase1.
# During these epochs the text encoder stays frozen.
# Set to 0 to train text encoder from epoch 1.
freeze_text_encoder_epochs: 10

musgd:
  # MuSGD hyperparameters used when optimizer=musgd.
  # These shape momentum behavior and numerical stability.
  # Kept in config to support ablations without code edits.
  momentum: 0.95
  muon_beta: 0.95
  eps: 1.0e-8

dwbd:
  # Dynamic teacher-vs-GT blend schedule for verifier targets.
  # Alpha decays from alpha_max to alpha_min with exponent gamma.
  # Used inside DWBD computation during phase1.
  enabled: true
  alpha_max: 0.8
  alpha_min: 0.1
  gamma: 2.0

stal:
  # STAL reweights box loss for small-target emphasis.
  # Area threshold marks what counts as “small”.
  # max_boost caps additional weight.
  enabled: true
  area_threshold: 0.05
  max_boost: 1.5

progloss:
  # Progressive loss scaling across epochs.
  # Box and verifier terms can anneal in opposite directions.
  # `power` controls curve shape (linear when 1.0).
  enabled: true
  box_start_scale: 0.9
  box_end_scale: 1.1
  verifier_start_scale: 1.1
  verifier_end_scale: 0.9
  power: 1.0
